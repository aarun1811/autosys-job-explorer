# Disable Spring Boot's own DB/ES auto-configuration for context-load tests.
# DataSourceAutoConfiguration and JpaRepositoriesAutoConfiguration are already excluded
# at the @SpringBootApplication level in RectraceApplication.java; the entries below
# handle the remaining auto-configs that still fire without this file.
# Note: DataSourceConfig and AutosysDataSourceConfig also have @Profile("!test")
# because they are user-defined @Configuration beans (not auto-configs).
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration

# Placeholder values to satisfy any @Value injections not guarded by @Profile("!test")
spring.datasource.url=
datasource.url=jdbc:oracle:thin:@test-placeholder
datasource.username=test
datasource.service-name=TEST
datasource.db-schema=TEST
datasource.driver-class-name=oracle.jdbc.OracleDriver

# Disable JPA DDL in test profile
spring.jpa.hibernate.ddl-auto=none

# Suppress ES connection attempt
spring.elasticsearch.uris=http://localhost:9200

# Phase 7 / OBS-03 — Spring Boot's @SpringBootTest infrastructure installs
# DisableObservabilityContextCustomizer which sets management.defaults.metrics.export.enabled=false.
# That hides /actuator/prometheus from the actuator HAL response and breaks
# ActuatorExposureTest's allow-list assertion. Re-enable it explicitly so the
# exposure contract test sees the same _links envelope as production.
# Both the defaults and the prometheus-specific export flag are flipped to true
# because DisableObservabilityContextCustomizer toggles BOTH at once and our
# override has to mirror that. (Plan 03 OBS-05 owns the production prometheus
# wiring; these properties only restore Boot's default for the test profile.)
management.defaults.metrics.export.enabled=true
management.prometheus.metrics.export.enabled=true
