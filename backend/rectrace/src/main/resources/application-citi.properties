# Citi laptop / VM profile.
# Activated with: -Dspring-boot.run.profiles=citi  (IntelliJ run config or CLI)
#                 or: -Dspring.profiles.active=citi  (java -jar)
#
# This file is committed with placeholder values. Edit it ONCE inside Citi
# with the real connection details, then DO NOT push the filled version back
# to the public GitHub remote — same convention as application-local.properties
# (plaintext credentials are LOCAL TO YOUR MACHINE ONLY).
#
# Every key below is required. Replace each <CITI_*> placeholder with the real
# value. The backend will fail at startup if any datasource/ES key is missing.
#
# Inherit common properties (observability lockdown, hibernate dialect, etc.)
# from application.properties. The defaults in that file (Autonomous DB URL,
# Splunk host) are overridden below.
spring.config.import=classpath:application.properties

# ─── Server ───────────────────────────────────────────────────────────────────
# Same context path + port as local — React proxy in vite.config.ts targets
# http://localhost:6088/rectrace. If you change either of these you must
# also update frontend-react/vite.config.ts.
server.port=6088
server.servlet.context-path=/rectrace

# ─── Primary Oracle (RECTRACE schema) ─────────────────────────────────────────
# Plain JDBC URL pattern: jdbc:oracle:thin:@//<host>:<port>/<service_name>
datasource.url=jdbc:oracle:thin:@//<CITI_ORACLE_HOST>:<CITI_ORACLE_PORT>/<CITI_ORACLE_SERVICE>
datasource.username=<CITI_RECTRACE_DB_USERNAME>
datasource.password=<CITI_RECTRACE_DB_PASSWORD>
datasource.driver-class-name=oracle.jdbc.OracleDriver
datasource.service-name=<CITI_ORACLE_SERVICE>
# Schema name in Citi — may differ slightly from local "RECTRACE". Match the
# actual schema owner of the rectrace_core table.
datasource.db-schema=<CITI_RECTRACE_SCHEMA>

# ─── Read-only Oracle pool (SQL tab) ──────────────────────────────────────────
# Backs the SQL tab evaluator with a structurally read-only Oracle principal
# (CREATE SESSION + QUOTA 0 + SELECT-only privileges). If Citi doesn't have a
# separate readonly user yet, you can point this at the same RECTRACE
# credentials above as a temporary measure — the per-statement setMaxRows /
# setQueryTimeout / setFetchSize caps still apply.
datasource.readonly.url=jdbc:oracle:thin:@//<CITI_ORACLE_HOST>:<CITI_ORACLE_PORT>/<CITI_ORACLE_SERVICE>
datasource.readonly.username=<CITI_RECTRACE_READONLY_USERNAME>
datasource.readonly.password=<CITI_RECTRACE_READONLY_PASSWORD>
datasource.readonly.driver-class-name=oracle.jdbc.OracleDriver
datasource.readonly.service-name=<CITI_ORACLE_SERVICE>
datasource.readonly.db-schema=<CITI_RECTRACE_SCHEMA>
datasource.readonly.hikari.maximum-pool-size=5
datasource.readonly.hikari.minimum-idle=1
datasource.readonly.hikari.connection-timeout=20000
datasource.readonly.queryTimeoutSeconds=30
datasource.readonly.fetchSize=500
datasource.readonly.maxRows=10000
sql-search-config.location=classpath:sql-search-config-v4.json

# ─── Secondary Oracle (AUTOSYS schema) ────────────────────────────────────────
# The AUTOSYS schema may live on the same Oracle instance or a different one.
# Update host/port/service accordingly if it differs from primary.
autosys.db.url=jdbc:oracle:thin:@//<CITI_ORACLE_HOST>:<CITI_ORACLE_PORT>/<CITI_ORACLE_SERVICE>
autosys.db.username=<CITI_AUTOSYS_DB_USERNAME>
autosys.db.password=<CITI_AUTOSYS_DB_PASSWORD>
autosys.db.driver-class-name=oracle.jdbc.OracleDriver
autosys.db.schema=<CITI_AUTOSYS_SCHEMA>
autosys.db.hikari.minimum-idle=1
autosys.db.hikari.maximum-pool-size=5
autosys.db.hikari.connection-timeout=20000

# ─── Elasticsearch ────────────────────────────────────────────────────────────
# URL with scheme (https:// is typical for Citi; http:// also works).
spring.elasticsearch.uris=<CITI_ES_URL>
spring.elasticsearch.username=<CITI_ES_USERNAME>
spring.elasticsearch.password=<CITI_ES_PASSWORD>

# ─── Search config (config-driven category definitions) ───────────────────────
# Use the bundled classpath JSON — same shape as local/prod profiles.
search-config.location=classpath:search-config-v4.json

# ─── Micrometer tracing ───────────────────────────────────────────────────────
# Full sample rate during laptop testing — turn down (e.g., 0.1) once running
# against real Citi load.
management.tracing.sampling.probability=1.0

# ─── CORS allow-list ──────────────────────────────────────────────────────────
# Permit the Vite dev server origin so the React frontend (pnpm dev) can hit
# the backend. macOS resolves localhost to IPv6 [::1] first; Windows tends to
# resolve to 127.0.0.1. Listing all three forms covers both.
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173,http://localhost:6088,http://127.0.0.1:6088,http://[::1]:6088
