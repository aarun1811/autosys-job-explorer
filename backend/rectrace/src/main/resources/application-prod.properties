# Production Profile Configuration
#
# Activate EXTERNALLY only — Spring Boot 3.x forbids `spring.profiles.active` inside a
# profile-specific file (InvalidConfigDataPropertyException). Use one of:
#   -Dspring.profiles.active=prod   |   SPRING_PROFILES_ACTIVE=prod   |   --spring.profiles.active=prod
#
# Fill every <CITI_*> placeholder on the Citi laptop BEFORE `mvn package`. These values
# stay inside Citi (the jar is built on the laptop and run on the server).
#
# Password handling:
#   - PRIMARY + READ-ONLY Oracle passwords are LEFT BLANK on purpose -> the app fetches
#     them at runtime via /opt/rectify/control/scripts/get_password.sh, keyed on
#     (service-name, db-schema). So they are NOT baked into the jar.
#   - AUTOSYS password is set DIRECTLY for now (moves to the script next week).
#   - ES uses basic auth -> username/password set directly.

# Inherit common config (observability lockdown, dialect, actuator, lifecycle).
spring.config.import=classpath:application.properties

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=6088
server.servlet.context-path=/rectrace

# ─── Primary Oracle (RECTRACE schema) — password via get_password.sh (LEAVE BLANK) ─
datasource.url=jdbc:oracle:thin:@//<CITI_ORACLE_HOST>:<CITI_ORACLE_PORT>/<CITI_ORACLE_SERVICE>
datasource.username=<CITI_RECTRACE_DB_USERNAME>
# BLANK on purpose -> ScriptExecutor runs get_password.sh @<service> <schema>.
datasource.password=
datasource.driver-class-name=oracle.jdbc.OracleDriver
datasource.service-name=<CITI_ORACLE_SERVICE>
datasource.db-schema=<CITI_RECTRACE_SCHEMA>

# ─── Read-only Oracle pool (SQL tab) — password via get_password.sh (LEAVE BLANK) ──
datasource.readonly.url=jdbc:oracle:thin:@//<CITI_ORACLE_HOST>:<CITI_ORACLE_PORT>/<CITI_ORACLE_SERVICE>
datasource.readonly.username=<CITI_RECTRACE_READONLY_USERNAME>
datasource.readonly.password=
datasource.readonly.driver-class-name=oracle.jdbc.OracleDriver
datasource.readonly.service-name=<CITI_ORACLE_SERVICE>
datasource.readonly.db-schema=<CITI_RECTRACE_SCHEMA>
datasource.readonly.hikari.maximum-pool-size=5
datasource.readonly.hikari.minimum-idle=1
datasource.readonly.hikari.connection-timeout=20000
datasource.readonly.queryTimeoutSeconds=30
datasource.readonly.fetchSize=500
datasource.readonly.maxRows=10000
sql-search-config.location=classpath:sql-search-config-v4.json

# ─── Secondary Oracle (AUTOSYS schema) — DIRECT password for now ───────────────
# Next week: blank autosys.db.password + set autosys.db.service-name so it uses the
# script too (the code already supports the blank-> get_password.sh fallback).
autosys.db.url=jdbc:oracle:thin:@//<CITI_ORACLE_HOST>:<CITI_ORACLE_PORT>/<CITI_ORACLE_SERVICE>
autosys.db.username=<CITI_AUTOSYS_DB_USERNAME>
autosys.db.password=<CITI_AUTOSYS_DB_PASSWORD>
autosys.db.driver-class-name=oracle.jdbc.OracleDriver
autosys.db.service-name=<CITI_ORACLE_SERVICE>
autosys.db.schema=<CITI_AUTOSYS_SCHEMA>
autosys.db.hikari.minimum-idle=1
autosys.db.hikari.maximum-pool-size=5
autosys.db.hikari.connection-timeout=20000

# ─── Elasticsearch (basic auth) ────────────────────────────────────────────────
spring.elasticsearch.uris=<CITI_ES_URL>
spring.elasticsearch.username=<CITI_ES_USERNAME>
spring.elasticsearch.password=<CITI_ES_PASSWORD>

# ─── Search config (bundled in the jar) ────────────────────────────────────────
search-config.location=classpath:search-config-v4.json

# ─── RecViz embed origin (Stage 2) ─────────────────────────────────────────────
# The RecViz server origin the TLM/QuickRec iframe points at, e.g. https://recviz.citi.intra:8000
# Served to the React app at runtime via GET /rectrace/api/config. Leave as-is until RecViz is up.
app.recviz.origin=<CITI_RECVIZ_ORIGIN>

# ─── CORS allow-list ───────────────────────────────────────────────────────────
# The Citi portal origin(s) the browser uses. Comma-separated scheme://host[:port].
# Set EMPTY only if the React bundle is served strictly same-origin from this jar.
app.cors.allowed-origins=<CITI_PORTAL_ORIGIN>

# ─── Micrometer tracing — lower sample rate under real load ─────────────────────
management.tracing.sampling.probability=0.1

# ─── Rotating file logging ──────────────────────────────────────────────────────
# logback-spring.xml writes ${logging.file.path}/rectrace.log (JSON, daily + 100 MB
# rollover, 30-day / 3 GB retention). Default is ./logs relative to the run dir;
# change to an absolute path on the server, e.g. /opt/rectrace/logs
logging.file.path=logs

# ─── Splunk HEC (OPTIONAL) — OBS-07 ─────────────────────────────────────────────
# Fill if/when you have a Citi Splunk HEC endpoint. If unset/unreachable the app still
# logs to the rotating file + stdout(journald) and does NOT fail to boot. Token is
# reserved for a future HTTPS-HEC migration (raw-TCP HEC authenticates by source IP).
splunk.hec.host=<CITI_SPLUNK_HOST>
splunk.hec.port=9997
splunk.hec.token=<TO_BE_FILLED>
