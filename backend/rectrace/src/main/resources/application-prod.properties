# Production Profile Configuration
spring.profiles.active=prod

# Inherit common properties from application.properties
spring.config.import=classpath:application.properties

# AutoSys Production Database Configuration
autosys.db.schema=aedb_pa4
autosys.db.url=jdbc:oracle:thin:@[PROD_DB_HOST]:[PORT]/[SERVICE_NAME]
autosys.db.username=${AUTOSYS_PROD_DB_USERNAME}
autosys.db.password=${AUTOSYS_PROD_DB_PASSWORD}
autosys.db.driver-class-name=oracle.jdbc.OracleDriver

# Connection Pool Settings for AutoSys DB
autosys.db.hikari.maximum-pool-size=10
autosys.db.hikari.minimum-idle=5
autosys.db.hikari.connection-timeout=30000
autosys.db.hikari.idle-timeout=600000
autosys.db.hikari.max-lifetime=1800000