# Production Profile Configuration
spring.profiles.active=prod

# Inherit common properties from application.properties
spring.config.import=classpath:application.properties

# OBS-07 — Splunk HEC endpoint (D-7.14).
# Host/port are <TO_BE_FILLED> at deploy time by Citi ops. The defaults below
# are placeholders; logback-spring.xml reads them via <springProperty> and
# falls back to splunk.citi.intra.example:9997 if unset.
splunk.hec.host=splunk.citi.intra.example
splunk.hec.port=9997
# Token is reserved for a future HTTPS-HEC migration. The raw-TCP
# LogstashTcpSocketAppender used today authenticates by source IP, not token,
# so this value is currently UNUSED by the appender. Documented here so the
# day Splunk flips to HTTPS-HEC, ops can populate it and only one property file
# needs to change.
splunk.hec.token=<TO_BE_FILLED>