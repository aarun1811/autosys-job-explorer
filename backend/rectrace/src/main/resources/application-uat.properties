# UAT Profile Configuration
# Activate EXTERNALLY (-Dspring.profiles.active=uat / SPRING_PROFILES_ACTIVE=uat).
# Boot 3.x forbids setting spring.profiles.active inside a profile-specific file
# (InvalidConfigDataPropertyException) — it must NOT be set here.
#
# NOTE: this profile is NOT fully wired for a real deploy (no datasource/ES blocks).
# Use the `prod` profile for server deploys; mirror prod's structure here if UAT is needed.

# Inherit common properties from application.properties
spring.config.import=classpath:application.properties

# CORS allow-list — [NEEDS USER REVIEW] Citi UAT portal origin(s).
# See application-prod.properties for the same property in the prod profile.
app.cors.allowed-origins=<TO_BE_FILLED>