spring.application.name=rectrace

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
server.servlet.context-path=/rectrace

# ─── Connection defaults ─────────────────────────────────────────────────────
# This BASE file holds ONLY safe structural defaults. Connection coordinates and
# credentials are intentionally EMPTY here so that an unconfigured run fails loudly
# instead of silently targeting a developer's cloud DB / localhost ES. Every real
# profile (local / citi / prod) overrides the blanks below with its own values.
# Do NOT inline a wallet path, TNS alias, host, or credential in this file.

# Oracle DB Configuration (overridden per profile)
datasource.url=
datasource.username=
datasource.driver-class-name=oracle.jdbc.OracleDriver
datasource.service-name=
datasource.db-schema=RECTRACE

# Elasticsearch Configuration (overridden per profile)
spring.elasticsearch.uris=
spring.elasticsearch.username=
spring.elasticsearch.password=

# Search Configuration — classpath: so it resolves inside `java -jar` (it is bundled
# in the jar). A relative file: path does NOT exist on a server working dir.
search-config.location=classpath:search-config-v4.json

server.port=6088

# Secondary Oracle (AUTOSYS) — overridden per profile. Password resolves from the
# AUTOSYS_DB_PASSWORD env var here, or is set directly / via get_password.sh per profile.
autosys.db.url=
autosys.db.username=
autosys.db.password=${AUTOSYS_DB_PASSWORD:}
autosys.db.driver-class-name=oracle.jdbc.OracleDriver
autosys.db.schema=AUTOSYS
autosys.db.hikari.minimum-idle=5
autosys.db.hikari.maximum-pool-size=10
autosys.db.hikari.connection-timeout=20000

# Phase 6 LOADER-09 / Pitfall L3: extend graceful-shutdown phase timeout so
# BulkIngester.close() has room to flush in-flight ops on SIGTERM. Default
# 30s is usually enough for a healthy ES cluster, 60s adds safety margin for
# max-size batches (5 MiB) and retries. See 06-RESEARCH.md Pitfall L3.
spring.lifecycle.timeout-per-shutdown-phase=60s

# OBS-03 / OBS-08 — actuator lockdown + observability
# Explicit allow-list (D-7.3). NO wildcards. NO env / heapdump / shutdown / beans /
# configprops / threaddump / scheduledtasks. Sensitive endpoints are also explicitly
# excluded so an accidental include wildcard elsewhere cannot turn them back on.
management.endpoints.web.exposure.include=health,info,prometheus,loggers,metrics
management.endpoints.web.exposure.exclude=env,heapdump,shutdown,beans,configprops,threaddump,scheduledtasks
# Anonymous /actuator/health returns just {"status":"UP"}; details only when authorized (T-07-07).
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
# Annotation-driven Micrometer observations (@Timed / @Observed / @Counted).
management.observations.annotations.enabled=true
# Boot probes (liveness/readiness) — enables /actuator/health/liveness + /actuator/health/readiness.
management.endpoint.health.probes.enabled=true
# Phase 7 — slow-query threshold (Plan 03 wires the SlowQueryLoggerAspect; the
# property is declared here so the value is visible regardless of plan ordering).
observability.slow-query-threshold-ms=500
