# Phase 6 LOADER-09 / Pitfall L3: extend graceful-shutdown phase timeout so
# BulkIngester.close() has room to flush in-flight ops on SIGTERM. Default
# 30s is usually enough for a healthy ES cluster, 60s adds safety margin for
# max-size batches (5 MiB) and retries. See 06-RESEARCH.md Pitfall L3.
spring.lifecycle.timeout-per-shutdown-phase=60s

# OBS-03 / OBS-08 — actuator lockdown + observability
# Explicit allow-list (D-7.3). NO wildcards. NO env / heapdump / shutdown / beans /
# configprops / threaddump / scheduledtasks. Sensitive endpoints are also explicitly
# excluded so an accidental include wildcard elsewhere cannot turn them back on.
management.endpoints.web.exposure.include=health,info,prometheus,loggers,metrics
management.endpoints.web.exposure.exclude=env,heapdump,shutdown,beans,configprops,threaddump,scheduledtasks
# Anonymous /actuator/health returns just {"status":"UP"}; details only when authorized (T-07-07).
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
# Annotation-driven Micrometer observations (@Timed / @Observed / @Counted).
management.observations.annotations.enabled=true
# Boot probes (liveness/readiness) — enables /actuator/health/liveness + /actuator/health/readiness.
management.endpoint.health.probes.enabled=true
# Phase 7 — slow-query threshold (Plan 03 wires the SlowQueryLoggerAspect; the
# property is declared here so the value is visible regardless of plan ordering).
observability.slow-query-threshold-ms=500
# Phase 7 — loader run-age health group (Pitfall P-11 / D-7.12) is DEFERRED to
# Plan 07-03. Boot validates HealthEndpointGroup membership at startup and
# fails with NoSuchHealthContributorException if a referenced contributor is
# absent. Plan 07-03 declares both the LoaderRunAgeHealthIndicator @Component
# AND the `management.endpoint.health.group.loader.include=loaderRunAge`
# line in the same commit so neither side ever sees a dangling reference.
