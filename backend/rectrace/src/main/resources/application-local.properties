# Local development profile for the sibling repo (../rectrace-local-dev/) Docker stack.
# Activated with: mvn spring-boot:run -Dspring.profiles.active=local
#
# Sources:
# - sibling repo's .env.example for connection defaults
# - schema users created by ../rectrace-local-dev/init/01-create-schema-users.sql
#
# Per Phase 0.1 planning, this file was created in Phase 0.1 (scope concession to D-0.1.24)
# so the existing Boot 2.7.16 codebase can verify the sibling repo's seed before Phase 1 ships.
# Phase 1 D-1.14 inherits this file; it may be refined post-Boot-upgrade if 3.3.x property
# names change.
#
# SECURITY: Plaintext credentials below are LOCAL-DEV ONLY (match the sibling repo's
# .env.example). DO NOT enable this profile in any deployed environment (UAT, prod).
# Phase 9 (Domain Security) will add a startup guard against accidental activation.

spring.application.name=rectrace

# Suppress SQL noise locally (matches Phase 1 BOOT-08 cleanup intent)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
server.servlet.context-path=/rectrace

# Primary Oracle (RECTRACE schema user in local FREEPDB1)
datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
datasource.username=rectrace
datasource.password=rectrace_pwd
datasource.driver-class-name=oracle.jdbc.OracleDriver
datasource.service-name=FREEPDB1
datasource.db-schema=RECTRACE

# Elasticsearch (security disabled per D-0.1.16)
spring.elasticsearch.uris=http://localhost:9200

# Search Configuration
search-config.location=file:src/main/resources/search-config-v4.json

# Loader Configuration (Phase 6 / LOADER-01)
loader-config.location=classpath:loader-config-v4.json

server.port=6088

# Secondary Oracle (AUTOSYS schema user)
autosys.db.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
autosys.db.username=autosys
autosys.db.password=autosys_pwd
autosys.db.driver-class-name=oracle.jdbc.OracleDriver
autosys.db.schema=AUTOSYS
autosys.db.hikari.minimum-idle=1
autosys.db.hikari.maximum-pool-size=5
autosys.db.hikari.connection-timeout=20000

# Micrometer Tracing — Brave bridge (Phase 2 D-2.9, D-2.10, D-2.12)
management.tracing.sampling.probability=1.0

# Phase 5: Config-driven SELECT — read-only datasource + SQL tab caps
# Backs the SQL tab evaluator with a structurally read-only Oracle principal
# (CREATE SESSION + QUOTA 0 + SELECT on rectrace.rectrace_core only). Wave 2's
# ReadonlyDataSourceConfig binds the @Value("${datasource.readonly.*}") keys
# below. Property-name suffixes carry units (seconds, rows) per Pitfall 3 so
# readers don't need to consult bean code for semantics.
datasource.readonly.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
datasource.readonly.username=rectrace_readonly
datasource.readonly.password=rectrace_readonly_pwd
datasource.readonly.driver-class-name=oracle.jdbc.OracleDriver
datasource.readonly.service-name=FREEPDB1
datasource.readonly.db-schema=RECTRACE
datasource.readonly.hikari.maximum-pool-size=5
datasource.readonly.hikari.minimum-idle=1
datasource.readonly.hikari.connection-timeout=20000
datasource.readonly.queryTimeoutSeconds=30
datasource.readonly.fetchSize=500
datasource.readonly.maxRows=10000
sql-search-config.location=classpath:sql-search-config-v4.json

# CORS allow-list for local dev (Angular @ 4200, Vite @ 5173, backend self @ 6088).
# Closes CONCERNS.md CRITICAL — previous wildcard `*` is removed at the framework level.
# Each port is listed in three forms because macOS resolves `localhost` to IPv6 [::1]
# first, so browsers actually send `Origin: http://[::1]:5173`. Spring CORS does exact
# string matching, so we enumerate every form the browser might emit.
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://[::1]:4200,http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173,http://localhost:6088,http://127.0.0.1:6088,http://[::1]:6088

# Phase 2 / Loader extraction: gate the in-backend loader OFF in the local profile.
# The rectrace-loader module owns the loader subsystem on :6089 starting in Phase 3.
# Phase 4 removes this property entirely along with the loader code.
rectrace.loader.enabled=false
