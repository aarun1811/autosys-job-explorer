# Test-profile overrides for the skeleton contextLoads test.
#
# Layered on top of src/main/resources/application.properties (loaded first as the
# default profile) — this file is only picked up when @ActiveProfiles("test") is
# active, mirroring the tlm-stats pattern. Do NOT rename back to application.properties:
# that would shadow the main file and lose actuator lockdown + lifecycle timeout
# during `mvn test`.
#
# Disable Spring Boot's DB auto-configuration. The skeleton has no datasource
# configured in the default profile, so without this exclude
# DataSourceAutoConfiguration fails with "Failed to determine a suitable driver
# class" because no embedded driver (H2/HSQL/Derby) is on the classpath.
# JPA / DataSourceTransactionManager excludes are no longer required: Task 1 code-
# review fix #2 swapped spring-boot-starter-data-jpa → spring-boot-starter-jdbc, so
# HibernateJpaAutoConfiguration is no longer on the classpath. The real loader beans
# (Task 3) will live behind their own @Profile carve-outs.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Random server port — avoids collision with a live :6089 if another loader
# instance is up on the laptop during `mvn test`.
server.port=0
