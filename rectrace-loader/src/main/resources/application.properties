# Server Configuration
server.port=6089

# Application Name
spring.application.name=rectrace-loader

# Logging
logging.level.com.citi.gru.rectrace.loader=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.jdbc=DEBUG

# OBS-03 / OBS-08 — actuator lockdown + observability (Plan 07-04)
# Explicit allow-list (D-7.3). NO wildcards. NO env / heapdump / shutdown / beans /
# configprops / threaddump / scheduledtasks. Sensitive endpoints are also explicitly
# excluded so an accidental include wildcard elsewhere cannot turn them back on.
# Mirrors backend/rectrace except: the `management.endpoint.health.group.loader`
# line is deferred (Phase 7 Pitfall P-11 / D-7.12). Task 3 of the loader-extraction
# work moves LoaderRunAgeHealthIndicator into this module but the dedicated health
# group wiring stays off — the indicator contributes to the default /actuator/health
# aggregate, matching backend's pre-extraction posture.
management.endpoints.web.exposure.include=health,info,prometheus,loggers,metrics
management.endpoints.web.exposure.exclude=env,heapdump,shutdown,beans,configprops,threaddump,scheduledtasks
# Anonymous /actuator/health returns just {"status":"UP"}; details only when authorized (T-07-07).
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
# Annotation-driven Micrometer observations (@Timed / @Observed / @Counted).
management.observations.annotations.enabled=true
# Boot probes (liveness/readiness) — enables /actuator/health/liveness + /actuator/health/readiness.
management.endpoint.health.probes.enabled=true

# Phase 6 LOADER-09 / Pitfall L3: extend graceful-shutdown so BulkIngester.close()
# can flush in-flight ops on SIGTERM. Mirror of backend's value.
spring.lifecycle.timeout-per-shutdown-phase=60s

# CORS allow-list — loader has no browser consumer, but the field is required for
# CorsConfig in shared patterns. Empty value rejects all cross-origin requests.
app.cors.allowed-origins=

# Loader Configuration
loader-config.location=classpath:loader-config-v4.json
