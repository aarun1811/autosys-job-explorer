# Server Configuration
server.port=8080

# Application Name
spring.application.name=rectrace-tlm-stats

# Logging Configuration
logging.level.com.citi.gru.rectrace.tlmstats=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.jdbc=DEBUG

# OBS-03 / OBS-08 — actuator lockdown + observability (Plan 07-04)
# Explicit allow-list (D-7.3). NO wildcards. NO env / heapdump / shutdown / beans /
# configprops / threaddump / scheduledtasks. Sensitive endpoints are also explicitly
# excluded so an accidental include wildcard elsewhere cannot turn them back on.
# Mirrors backend/rectrace exactly except: NO management.endpoint.health.group.loader
# line — tlm-stats has no loader subsystem (per Plan 07-04 A3 / Open Q9).
management.endpoints.web.exposure.include=health,info,prometheus,loggers,metrics
management.endpoints.web.exposure.exclude=env,heapdump,shutdown,beans,configprops,threaddump,scheduledtasks
# Anonymous /actuator/health returns just {"status":"UP"}; details only when authorized (T-07-07).
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
# Annotation-driven Micrometer observations (@Timed / @Observed / @Counted).
management.observations.annotations.enabled=true
# Boot probes (liveness/readiness) — enables /actuator/health/liveness + /actuator/health/readiness.
management.endpoint.health.probes.enabled=true

# Database Configuration Templates
# TLM Database Instances (9 instances)
# These will be configured dynamically based on tlm_instance parameter

# Reconmgmt Database Configuration
reconmgmt.datasource.url=jdbc:oracle:thin:@//reconmgmt-host:1521/reconmgmt
reconmgmt.datasource.username=reconmgmt_user
reconmgmt.datasource.service-name=reconmgmt_service
reconmgmt.datasource.db-schema=reconmgmt_schema
reconmgmt.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Password Script Configuration
password.script.path=/opt/rectify/control/scripts/get_password.sh

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# CORS allow-list — [NEEDS USER REVIEW] Citi portal origin(s).
# Replaces the previous wildcard `*` + allowCredentials(true) combo (CONCERNS.md CRITICAL).
# Comma-separated scheme://host[:port] entries. Empty rejects all cross-origin requests.
app.cors.allowed-origins=<TO_BE_FILLED>