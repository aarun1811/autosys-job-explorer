# Local development profile for the sibling repo's Docker stack.
# Activated with: mvn spring-boot:run -Dspring.profiles.active=local
# See backend/rectrace/.../application-local.properties for the broader rationale.
#
# SECURITY: Plaintext credentials below are LOCAL-DEV ONLY (match the sibling repo's
# .env.example). DO NOT enable this profile in any deployed environment.

server.port=8080
spring.application.name=rectrace-tlm-stats

logging.level.com.citi.gru.rectrace.tlmstats=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.jdbc=INFO

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Reconmgmt datasource (RECONMGMT schema user in local FREEPDB1)
reconmgmt.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
reconmgmt.datasource.username=reconmgmt
reconmgmt.datasource.password=reconmgmt_pwd
reconmgmt.datasource.service-name=FREEPDB1
reconmgmt.datasource.db-schema=RECONMGMT
reconmgmt.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Recportal datasource (RECPORTAL schema user in local FREEPDB1)
recportal.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
recportal.datasource.username=recportal
recportal.datasource.password=recportal_pwd
recportal.datasource.service-name=FREEPDB1
recportal.datasource.db-schema=RECPORTAL
recportal.datasource.driver-class-name=oracle.jdbc.OracleDriver

# WARNING-4 note: DatabaseConfig.java calls scriptExecutor.executeScript(passwordScriptPath, ...)
# UNCONDITIONALLY at bean construction (see lines 80, 108, 190). The local profile cannot
# bypass it by setting password.script.path empty — the executeScript call still fires.
# Until Phase 1 adds a local-dev shim script, point this at a placeholder so the failure
# mode is LOUD (smoke step 1 will fail with a clear "script not found" error) rather than
# silently passing on stale state.
password.script.path=/tmp/rectrace-local-dev-password.sh

# Connection Pool (small for local dev)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Micrometer Tracing — Brave bridge (Phase 2 D-2.9, D-2.10, D-2.12)
management.tracing.sampling.probability=1.0

# CORS allow-list for local dev (Angular @ 4200, Vite @ 5173, tlm-stats self @ 8080).
# Closes CONCERNS.md CRITICAL — previous wildcard `*` with allowCredentials(true) removed.
# Each port listed in three forms (localhost / 127.0.0.1 / [::1]) because macOS resolves
# `localhost` to IPv6 [::1] first; the browser's Origin header will use that form.
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://[::1]:4200,http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173,http://localhost:8080,http://127.0.0.1:8080,http://[::1]:8080
