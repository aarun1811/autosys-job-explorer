# Disable Spring Boot's own DB auto-configuration.
# Note: DatabaseConfig also has @Profile("!test") because it is a user-defined
# @Configuration bean that calls ScriptExecutor and reads tlm-instances.json at startup.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

# Provide placeholder values to satisfy @Value-injected fields.
# The recportal URL property has no default in DatabaseConfig and is missing from
# application.properties (CONCERNS.md HIGH) — this placeholder prevents
# IllegalStateException on context load.
reconmgmt.datasource.url=jdbc:oracle:thin:@test-placeholder
reconmgmt.datasource.username=test
reconmgmt.datasource.service-name=TEST
reconmgmt.datasource.db-schema=TEST
reconmgmt.datasource.driver-class-name=oracle.jdbc.OracleDriver
recportal.datasource.url=jdbc:oracle:thin:@test-placeholder
recportal.datasource.username=test
recportal.datasource.service-name=TEST
recportal.datasource.db-schema=TEST

# Suppress password script path resolution (has a default but set explicitly for clarity)
password.script.path=/dev/null

# Phase 7 OBS-02 — show full health components in test profile so the actuator
# integration test can assert per-indicator status under $.components.<name>.
# Production keeps show-details=when-authorized in application.properties.
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Mirror the production exposure list (Plan 07-04 / D-7.3) so /actuator/prometheus,
# /actuator/metrics, /actuator/info, /actuator/loggers are reachable in test
# context. The prometheus registry IS on the classpath via Plan 07-01's
# micrometer-registry-prometheus dependency — it just needs to be exposed here.
management.endpoints.web.exposure.include=health,info,prometheus,loggers,metrics

# In test profile the Oracle indicator is DOWN by design (no datasource). Map
# DOWN to 200 so MockMvc assertions on the JSON body succeed — we are testing
# the JSON aggregation shape here, not actual cluster health. Production keeps
# the default mapping (DOWN -> 503) so k8s readiness probes work.
management.endpoint.health.status.http-mapping.down=200
management.endpoint.health.status.http-mapping.out-of-service=200

# Phase 7 / OBS-03 — Spring Boot's @SpringBootTest infrastructure installs
# DisableObservabilityContextCustomizer which sets
# management.defaults.metrics.export.enabled=false. That hides /actuator/prometheus
# from the actuator HAL response and breaks ActuatorExposureTest's allow-list
# assertion. Re-enable it explicitly so the exposure contract test sees the
# same _links envelope as production.
management.defaults.metrics.export.enabled=true
management.prometheus.metrics.export.enabled=true
