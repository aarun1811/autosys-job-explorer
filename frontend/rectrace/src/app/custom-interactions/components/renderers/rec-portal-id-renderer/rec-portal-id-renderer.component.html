@if (isClickable) {
<span class="rec-portal-id-link" (click)="onClick()" [class.loading]="isLoading">
  <mat-icon>insights</mat-icon>
  <span class="rec-portal-id-text">{{ value }}</span>
  @if (isLoading) {
  <mat-spinner diameter="14" class="spinner"></mat-spinner>
  }
</span>
} @if (!isClickable && value) {
<span class="rec-portal-id-text-plain">{{ value }}</span>
}
@if (!value || value === "-") {
<span class="empty-cell"></span>
}
