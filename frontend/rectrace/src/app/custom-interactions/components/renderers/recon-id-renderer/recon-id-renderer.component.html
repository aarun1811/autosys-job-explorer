@if (isClickable) {
<span class="recon-id-link" (click)="onClick()" [class.loading]="isLoading">
  <mat-icon>insights</mat-icon>
  <span class="recon-id-text">{{ value }}</span>
  @if (isLoading) {
  <mat-spinner diameter="14" class="spinner"></mat-spinner>

</span>
} @else {
<span>{{ value }}</span>
}
