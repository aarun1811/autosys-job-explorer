<div class="chart-container">
  <div class="chart-header">
    <div class="chart-title-section">
      <mat-icon class="chart-icon">pie_chart</mat-icon>
      <h3 class="chart-title">Distribution Overview</h3>
      <span *ngIf="hasData()" class="chart-total">({{ getTotalItems().toLocaleString() }} total items)</span>
    </div>
    
    <div class="chart-actions">
      <button 
        mat-icon-button 
        [matTooltip]="'Export as PNG'"
        (click)="exportChartAsImage('png')"
        [disabled]="!hasData() || isLoading"
        class="export-btn">
        <mat-icon>image</mat-icon>
      </button>
      
      <button 
        mat-icon-button 
        [matTooltip]="'Export as JPG'"
        (click)="exportChartAsImage('jpg')"
        [disabled]="!hasData() || isLoading"
        class="export-btn">
        <mat-icon>photo</mat-icon>
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="chart-loading">
    <div class="loading-content">
      <mat-spinner diameter="40"></mat-spinner>
      <span class="loading-text">Loading chart data...</span>
    </div>
  </div>

  <!-- Error State -->
  <div *ngIf="hasError && !isLoading" class="chart-error">
    <mat-icon class="error-icon">error_outline</mat-icon>
    <span class="error-text">Failed to load chart data</span>
  </div>

  <!-- Empty State -->
  <div *ngIf="!hasData() && !isLoading && !hasError" class="chart-empty">
    <mat-icon class="empty-icon">donut_large</mat-icon>
    <span class="empty-text">No data available for chart</span>
    <span class="empty-description">Apply filters to view distribution</span>
  </div>

  <!-- Chart -->
  <div *ngIf="hasData() && !isLoading && !hasError" class="chart-wrapper">
    <div class="simple-chart">
      <div class="chart-bars">
        <div class="chart-item" *ngFor="let item of chartData" 
             [style.--item-percentage]="item.percentage + '%'"
             [style.--item-color]="item.color">
          <div class="chart-bar">
            <div class="chart-fill"></div>
          </div>
          <div class="chart-label">
            <span class="category">{{item.category}}</span>
            <span class="value">{{item.value | number}} ({{item.percentage.toFixed(1)}}%)</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
