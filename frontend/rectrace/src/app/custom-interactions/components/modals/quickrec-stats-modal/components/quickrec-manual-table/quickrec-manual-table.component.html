<div class="table-container">
  @if (loading) {
    <div class="loading-overlay">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  }
  
  <ag-grid-angular
    class="ag-theme-alpine quickrec-manual-grid"
    [gridOptions]="gridOptions"
    [rowData]="data"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef">
  </ag-grid-angular>
</div>
