<div class="search-v4-container">
  <!-- Search Header -->
  <mat-toolbar color="primary" class="search-header">
    <span>Search V4 - Discovery Tool</span>
  </mat-toolbar>

  <!-- Search Bar -->
  <div class="search-bar-container">
    <mat-form-field appearance="outline" class="search-input">
      <mat-label>Enter search term</mat-label>
      <input matInput 
             [(ngModel)]="searchTerm" 
             (keypress)="onKeyPress($event)"
             [disabled]="isLoading"
             placeholder="Search for files, jobs, boxes, etc...">
      <button mat-icon-button matSuffix *ngIf="searchTerm" (click)="clearSearch()" [disabled]="isLoading">
        <mat-icon>clear</mat-icon>
      </button>
    </mat-form-field>
    
    <button mat-raised-button 
            color="primary" 
            (click)="performSearch()"
            [disabled]="isLoading || !searchTerm">
      <mat-icon>search</mat-icon>
      Search
    </button>
  </div>

  <!-- Loading Spinner -->
  <div class="loading-container" *ngIf="isLoading">
    <mat-progress-spinner mode="indeterminate" diameter="50"></mat-progress-spinner>
    <p>Searching across all categories...</p>
  </div>

  <!-- Error Message -->
  <div class="error-message" *ngIf="errorMessage && !isLoading">
    <mat-icon>error</mat-icon>
    {{ errorMessage }}
  </div>

  <!-- Search Results Tabs -->
  <div class="results-container" *ngIf="searchResults.length > 0 && !isLoading">
    <mat-tab-group [(selectedIndex)]="selectedTab" animationDuration="0ms">
      <mat-tab *ngFor="let category of searchResults" [label]="getTabLabel(category)">
        <div class="tab-content">
          <app-search-v4-grid 
            [category]="category.key"
            [categoryLabel]="category.label"
            [initialFilter]="category.values"
            [columns]="category.columns"
            [searchColumn]="category.key">
          </app-search-v4-grid>
        </div>
      </mat-tab>
    </mat-tab-group>
  </div>
</div>
