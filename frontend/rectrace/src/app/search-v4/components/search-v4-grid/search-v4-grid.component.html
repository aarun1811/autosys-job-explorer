<div class="grid-container">
  <!-- Grid Toolbar -->
  <div class="grid-toolbar">
    <span class="category-label">{{ categoryLabel }}</span>
    <span class="result-count">({{ initialFilter.length }} unique results)</span>
    
    <div class="toolbar-actions">
      <button mat-icon-button (click)="expandAll()" matTooltip="Expand All">
        <mat-icon>unfold_more</mat-icon>
      </button>
      <button mat-icon-button (click)="collapseAll()" matTooltip="Collapse All">
        <mat-icon>unfold_less</mat-icon>
      </button>
      <button mat-icon-button (click)="clearFilters()" matTooltip="Clear Filters">
        <mat-icon>filter_alt_off</mat-icon>
      </button>
      <button mat-icon-button (click)="refreshGrid()" matTooltip="Refresh">
        <mat-icon>refresh</mat-icon>
      </button>
      <button mat-icon-button (click)="exportToExcel()" [disabled]="isExporting" 
              [matTooltip]="isExporting ? 'Exporting...' : 'Export to Excel'">
        <mat-icon>{{ isExporting ? 'hourglass_empty' : 'file_download' }}</mat-icon>
      </button>
    </div>
  </div>
  
  <!-- AG-Grid -->
  <ag-grid-angular
    class="ag-theme-material grid"
    [gridOptions]="gridOptions"
    [rowModelType]="'serverSide'"
    [animateRows]="true"
    [suppressRowClickSelection]="true">
  </ag-grid-angular>
</div>
